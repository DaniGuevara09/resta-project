<!-- src/app/features/login/login.component.html -->
<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="brand">
      <h1 class="brand-name">{{ tenant | uppercase }}</h1>
      <p class="brand-sub">Sistema de gestión</p>
    </div>

    <!-- Error -->
    <div class="error-box" *ngIf="errorMsg">
      <span>{{ errorMsg }}</span>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" autocomplete="on">

      <div class="field">
        <label for="username">Usuario</label>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="Ej: cocinero.frisby"
          autocomplete="username"
          [disabled]="loading"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="pass-wrap">
          <input
            id="password"
            [type]="showPass ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            [disabled]="loading"
          />
          <button type="button" class="eye-btn" (click)="showPass = !showPass">
            {{ showPass ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <div class="divider"><span>o</span></div>

    <button class="btn-secondary" (click)="goToMenu()" [disabled]="loading">
      Ver menú como cliente
    </button>

  </div>
</div>
