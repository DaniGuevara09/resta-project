version: '3.8'

services:
  # 1. Servicio de Productos
  product-service:
    build: ./product-service
    ports:
      - "5001:5001"
    env_file: ./product-service/.env
    restart: always

  # 2. Servicio de Pedidos
  order-service:
    build: ./order-service
    ports:
      - "5002:5002"
    env_file: ./order-service/.env
    restart: always

  # 3. Servicio de Facturación
  billing-service:
    build: ./billing-service
    ports:
      - "5003:5003"
    env_file: ./billing-service/.env
    restart: always

networks:
  default:
    name: resta-network
